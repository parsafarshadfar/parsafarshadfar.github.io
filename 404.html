<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — Parsa Farshadfar</title>
    <meta name="description" content="That page does not exist on parsafarshadfar.com.">
    <!-- Error pages must never be indexed, or they compete with the real page. -->
    <meta name="robots" content="noindex, follow">

    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E🤖%3C/text%3E%3C/svg%3E"
        type="image/svg+xml">
    <meta name="theme-color" content="#6a11cb">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Outfit:wght@300;400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            color-scheme: light dark;
            --bg: #f0f2f8;
            --card: rgba(255, 255, 255, 0.7);
            --text: #1a1a2e;
            --muted: #4a4a6a;
            --border: rgba(106, 17, 203, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a1a;
                --card: rgba(20, 20, 50, 0.6);
                --text: #e8e8f0;
                --muted: #b0b0d0;
                --border: rgba(106, 17, 203, 0.3);
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg);
            background-image: linear-gradient(135deg, rgba(106, 17, 203, 0.10) 0%, rgba(37, 117, 252, 0.10) 100%);
            color: var(--text);
            font-family: 'Outfit', system-ui, sans-serif;
            text-align: center;
        }

        .card {
            max-width: 540px;
            width: 100%;
            padding: 48px 36px;
            border-radius: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            backdrop-filter: blur(12px);
        }

        .code {
            font-family: 'Inter', sans-serif;
            font-size: clamp(3.5rem, 14vw, 5.5rem);
            font-weight: 800;
            line-height: 1;
            margin: 0 0 8px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 12px;
        }

        p {
            color: var(--muted);
            line-height: 1.7;
            margin: 0 0 28px;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        a.btn {
            display: inline-block;
            padding: 11px 24px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        a.btn.ghost {
            background: none;
            color: var(--text);
            border: 1px solid var(--border);
        }

        a.btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(106, 17, 203, 0.35);
        }
    </style>
</head>

<body>
    <main class="card">
        <p class="code">404</p>
        <h1>That page doesn't exist</h1>
        <p>
            The link may be out of date or mistyped. Everything about my work,
            experience, and projects lives on the home page.
        </p>
        <div class="links">
            <a class="btn" href="/">Go to the home page</a>
            <a class="btn ghost" href="https://grandprint.app/" target="_blank" rel="noopener">Visit Grand Print</a>
        </div>
    </main>
</body>

</html>
